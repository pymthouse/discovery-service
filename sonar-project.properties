# SonarQube Cloud — discovery-service (Go)
#
# CI sets sonar.organization and sonar.projectKey via GitHub Actions variables.
# For local SonarScanner / SonarLint connected mode (see .sonarlint/connectedMode.json):
sonar.organization=eliteprox
sonar.projectKey=eliteprox_discovery-service
sonar.host.url=https://sonarcloud.io
#
# See .github/workflows/sonarqube-cloud.yml and:
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/ci-based-analysis/github-actions-for-sonarcloud
#
# Go uses the SonarScanner CLI path (sonar-project.properties), not Maven/Gradle/.NET scanners.

# --- Go production sources ---
sonar.sources=cmd,internal,pkg
sonar.exclusions=\
  **/*_test.go,\
  **/openapi/**,\
  **/static/**,\
  **/fixtures/**,\
  **/migrations/**,\
  **/deploy/**,\
  **/.github/**

# sonar.inclusions=

# --- Tests ---
sonar.tests=cmd,internal,pkg
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=

# --- Encoding ---
sonar.sourceEncoding=UTF-8

# --- Go coverage (generated in CI: go test -coverprofile=coverage.out) ---
sonar.go.coverage.reportPaths=coverage.out

# --- Copy-paste detection (skip generated / duplicated spec assets) ---
sonar.cpd.exclusions=\
  **/openapi/**,\
  **/static/**,\
  **/fixtures/**,\
  internal/db/migrations.sql,\
  migrations/**
