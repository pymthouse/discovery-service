# Railway cron service — triggers dataset refresh once per schedule.
# Create a "Cron" service in Railway, point Dockerfile to deploy/cron/Dockerfile,
# set cron schedule e.g. "0 */1 * * *" (hourly) or "*/15 * * * *" (every 15 min).

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/cron/Dockerfile"

[deploy]
# Cron jobs are not long-running; numReplicas = 1, triggered by schedule
restartPolicyType = "NEVER"
