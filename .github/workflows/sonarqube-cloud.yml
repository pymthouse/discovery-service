# SonarQube Cloud via GitHub Actions (Go / SonarScanner CLI)
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/ci-based-analysis/github-actions-for-sonarcloud
name: SonarQube Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: SonarQube Cloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history improves new-code / blame analysis (SonarQube docs)
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Verify SonarQube Cloud configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_DISCOVERY_SERVICE_PROJECT_KEY }}
        run: |
          test -n "$SONAR_TOKEN" || { echo "SONAR_TOKEN secret is required"; exit 1; }
          test -n "$SONAR_ORGANIZATION" || { echo "SONAR_ORGANIZATION repository variable is required"; exit 1; }
          test -n "$SONAR_PROJECT_KEY" || { echo "SONAR_DISCOVERY_SERVICE_PROJECT_KEY repository variable is required"; exit 1; }

      # CI-based analysis cannot run while Automatic Analysis is enabled:
      # https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis/
      - name: Disable SonarQube Cloud Automatic Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_DISCOVERY_SERVICE_PROJECT_KEY }}
        run: |
          code=$(curl -sS -o /tmp/sonar-autoscan.json -w '%{http_code}' -X POST \
            -u "${SONAR_TOKEN}:" \
            --data-urlencode "projectKey=${SONAR_PROJECT_KEY}" \
            --data-urlencode "enable=false" \
            "https://sonarcloud.io/api/autoscan/activation")
          echo "autoscan/activation HTTP ${code}"
          cat /tmp/sonar-autoscan.json || true
          echo
          # 204/200 = disabled (or already off). 403/404 = token lacks project admin — fail clearly.
          case "$code" in
            200|204) ;;
            *)
              echo "Failed to disable Automatic Analysis (HTTP ${code})."
              echo "Disable it manually: SonarCloud → project Administration → Analysis Method."
              exit 1
              ;;
          esac

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_DISCOVERY_SERVICE_PROJECT_KEY }}
            "-Dsonar.projectName=discovery-service"
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
