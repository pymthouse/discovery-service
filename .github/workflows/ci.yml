name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -count=1 ./...

      - name: Require ORCH_DISCOVERY_EXTRA_URIS in Railway deploy docs
        run: |
          set -euo pipefail
          file=deploy/railway/README.md
          line=$(grep -E '^ORCH_DISCOVERY_EXTRA_URIS=' "$file" || true)
          if [ -z "$line" ]; then
            echo "missing ORCH_DISCOVERY_EXTRA_URIS= in $file"
            exit 1
          fi
          value=${line#ORCH_DISCOVERY_EXTRA_URIS=}
          if [ -z "$value" ]; then
            echo "ORCH_DISCOVERY_EXTRA_URIS must be non-empty in $file so production probes stay documented"
            exit 1
          fi
          echo "ok: $line"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Build discoveryd
        run: CGO_ENABLED=0 go build -o /tmp/discoveryd ./cmd/discoveryd

      - name: Build Apache image
        run: docker build -f deploy/apache/Dockerfile -t discovery-apache:ci .

      - name: Build discoveryd image
        run: docker build -f Dockerfile -t discoveryd:ci .
